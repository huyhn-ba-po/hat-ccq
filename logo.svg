<svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#7aa2ff" />
      <stop offset="100%" stop-color="#38d6c2" />
    </linearGradient>
    <linearGradient id="leafGrad" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#0a1a14" />
      <stop offset="100%" stop-color="#0a1a14" stop-opacity="0.85" />
    </linearGradient>
  </defs>

  <!-- Rounded square background with gradient -->
  <rect width="64" height="64" rx="14" fill="url(#bgGrad)" />

  <!-- Right leaf (main, larger) -->
  <path
    d="M32 34 C36 22, 46 18, 52 22 C49 32, 42 38, 32 34 Z"
    fill="url(#leafGrad)"
  />
  <!-- Left leaf (smaller, slightly lower) -->
  <path
    d="M32 38 C28 30, 20 28, 14 32 C17 40, 24 43, 32 38 Z"
    fill="#0a1a14"
    opacity="0.7"
  />
  <!-- Stem -->
  <path
    d="M32 50 Q32 42 32 36"
    stroke="#0a1a14"
    stroke-width="3"
    stroke-linecap="round"
    fill="none"
  />
  <!-- Seed (gold drop) -->
  <ellipse cx="32" cy="50" rx="5" ry="3" fill="#f5c451" />
  <ellipse cx="32" cy="49.5" rx="3" ry="1.5" fill="#fce19a" opacity="0.6" />
</svg>
